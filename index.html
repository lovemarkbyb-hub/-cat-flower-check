<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>묘한 꽃집 — 고양이 안전 꽃 확인</title>
<style>
  :root {
    --paper: #FBF7F0;
    --ink: #2B2722;
    --sub: #8A8073;
    --card: #FFFFFF;
    --line: #EAE3D7;
    --safe: #3BA776;
    --caution: #E0A21B;
    --danger: #D8503D;
    --accent: #C97B5A;
    --safe-bg: #E8F4EC;
    --caution-bg: #FBF1DC;
    --danger-bg: #FAE7E3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }

  .eyebrow { font-size: 13px; color: var(--accent); font-weight: 600; letter-spacing: 0.5px; }
  h1 { font-size: 44px; font-weight: 800; letter-spacing: -1.5px; margin: 4px 0 10px; }
  .lede { font-size: 16px; color: var(--sub); margin-bottom: 6px; }
  .lede-paw { font-size: 14px; color: var(--accent); margin-bottom: 28px; }

  .how {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 18px 20px; margin-bottom: 24px;
  }
  .how-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .how-legend { display: flex; flex-wrap: wrap; gap: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

  .search-row { display: flex; gap: 8px; }
  #q {
    flex: 1; background: var(--card); border: 1px solid var(--line);
    border-radius: 14px; padding: 15px 16px; font-size: 16px; color: var(--ink);
    font-family: inherit; outline: none;
  }
  #q:focus { border-color: var(--accent); }
  #searchBtn {
    background: var(--ink); color: #fff; border: none; border-radius: 14px;
    padding: 0 22px; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  #searchBtn:active { opacity: 0.85; }

  .suggest { background: var(--card); border: 1px solid var(--line); border-radius: 14px; margin-top: 8px; overflow: hidden; }
  .suggest-item { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; cursor: pointer; border-bottom: 1px solid var(--line); }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover { background: var(--paper); }
  .dot { width: 10px; height: 10px; border-radius: 50%; }

  .result-card { margin-top: 20px; border-radius: 18px; border: 2px solid; overflow: hidden; }
  .result-photo {
    width: 100%; height: 220px; object-fit: cover; display: block; background: var(--line);
  }
  .photo-ph {
    width: 100%; height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--paper); color: var(--sub); gap: 8px;
  }
  .photo-ph-emoji { font-size: 44px; opacity: 0.5; }
  .photo-ph-text { font-size: 13px; }
  .result-body { padding: 22px; }
  .result-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .result-name { font-size: 28px; font-weight: 800; }
  .result-sci { font-size: 13px; font-style: italic; color: var(--sub); margin-top: 2px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; color: #fff; padding: 7px 13px; border-radius: 999px; font-weight: 800; font-size: 14px; white-space: nowrap; }
  .risk-desc { font-size: 15px; font-weight: 600; margin-top: 14px; }
  .cat-says {
    margin-top: 14px; padding: 12px 14px; background: var(--paper); border-radius: 12px;
    font-size: 14px; color: var(--ink); display: flex; gap: 8px; align-items: flex-start;
  }
  .cat-says .paw { flex-shrink: 0; }
  .info-block { margin-top: 14px; }
  .info-label { font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: 0.5px; margin-bottom: 3px; }
  .info-text { font-size: 15px; }
  .emergency { margin-top: 16px; background: var(--danger); color: #fff; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 700; }
  .not-found { margin-top: 20px; padding: 20px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; }
  .not-found-title { font-size: 17px; font-weight: 700; }
  .not-found-desc { font-size: 14px; color: var(--sub); margin-top: 6px; }

  .divider { height: 1px; background: var(--line); margin: 36px 0; }
  .section-eyebrow { font-size: 13px; color: var(--accent); font-weight: 600; letter-spacing: 0.5px; }
  .section-title { font-size: 22px; font-weight: 800; margin: 4px 0 6px; }
  .section-sub { font-size: 14px; color: var(--sub); margin-bottom: 16px; }
  .section-title.warn { margin-top: 28px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .grid-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.12s; }
  .grid-card:hover { transform: translateY(-2px); }
  .grid-photo { width: 100%; height: 110px; object-fit: cover; display: block; background: var(--line); }
  .grid-photo-ph { width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; background: var(--paper); font-size: 32px; opacity: 0.5; }
  .grid-info { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; }
  .grid-name { font-size: 15px; font-weight: 600; }

  .disclaimer { font-size: 12px; color: var(--sub); line-height: 1.6; margin-top: 40px; }
  .source { font-size: 11px; color: var(--sub); margin-top: 8px; }

  @media (max-width: 480px) {
    h1 { font-size: 36px; }
    .wrap { padding: 24px 18px 60px; }
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">고양이와 함께 사는 집을 위한</div>
  <h1>묘한 꽃집</h1>
  <p class="lede">집에 들일 꽃, 우리 고양이에게 안전한지 먼저 확인하세요. 꽃 이름을 검색하면 안전 여부와 함께 사진으로 보여드려요.</p>
  <p class="lede-paw">🐾 집사야, 꽃 들이기 전에 나한테 한 번만 물어봐 줘.</p>

  <div class="how">
    <div class="how-title">위험도는 세 가지로 알려드려요</div>
    <div class="how-legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--safe)"></span>안전 · 곁에 둬도 괜찮아요</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--caution)"></span>주의 · 가까이 두지 않기를 권해요</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--danger)"></span>위험 · 집에 두지 마세요</div>
    </div>
  </div>

  <div class="search-row">
    <input id="q" type="text" placeholder="예: 백합, 장미, 튤립" autocomplete="off">
    <button id="searchBtn">확인</button>
  </div>
  <div id="suggest"></div>
  <div id="result"></div>

  <div class="divider"></div>
  <div class="section-eyebrow" id="monthEyebrow"></div>
  <div class="section-title">지금 사도 안심인 꽃</div>
  <div class="section-sub">이맘때 제철인 꽃 중에서, 내가 곁에 있어도 괜찮은 아이들이야. 🐾</div>
  <div class="grid" id="safeGrid"></div>
  <div id="dangerSection"></div>

  <p class="disclaimer" id="disclaimer"></p>
  <p class="source" id="source"></p>
</div>

"safe":true,"severity":"safe","symptoms":null,"note":"ASPCA 무독성 분류","aliases":[],"risk":"safe","bloomMonths":[2,3,4]},{"id":33,"nameKo":"스토크","nameEn":"Stock","scientificName":"Matthiola incana","safe":true,"severity":"safe","symptoms":null,"note":"ASPCA 무독성 분류","aliases":["비단향꽃무"],"risk":"safe","bloomMonths":[3,4,5]},{"id":34,"nameKo":"리시안서스","nameEn":"Lisianthus","scientificName":"Eustoma grandiflorum","safe":true,"severity":"safe","symptoms":null,"note":"ASPCA 무독성 분류","aliases":["꽃도라지","유스토마"],"risk":"safe","bloomMonths":[6,7,8,9,10]},{"id":35,"nameKo":"아스타","nameEn":"Aster","scientificName":"Aster spp.","safe":true,"severity":"safe","symptoms":null,"note":"ASPCA 무독성 분류 (true aster). 다량 섭취 시 위장 불편 가능","aliases":["과꽃"],"risk":"safe","bloomMonths":[9,10,11]},{"id":36,"nameKo":"코스모스","nameEn":"Cosmos","scientificName":"Cosmos bipinnatus","safe":true,"severity":"safe","symptoms":null,"note":"ASPCA 무독성 분류","aliases":[],"risk":"safe","bloomMonths":[9,10]},{"id":37,"nameKo":"라넌큘러스","nameEn":"Ranunculus (Buttercup)","scientificName":"Ranunculus spp.","safe":false,"severity":"moderate","symptoms":"입과 위장 자극, 침 흘림, 구토, 설사, 물집","note":"미나리아재비류. 즙에 자극 성분","aliases":["미나리아재비"],"risk":"caution","bloomMonths":[3,4,5]},{"id":38,"nameKo":"클레마티스","nameEn":"Clematis","scientificName":"Clematis spp.","safe":false,"severity":"moderate","symptoms":"침 흘림, 구토, 설사","note":"줄기와 잎에 자극 성분","aliases":["으아리"],"risk":"caution","bloomMonths":[5,6,7]},{"id":39,"nameKo":"작약","nameEn":"Peony","scientificName":"Paeonia officinalis","safe":false,"severity":"mild","symptoms":"구토, 설사, 무기력","note":"다량 섭취 시 위장 증상","aliases":["피오니"],"risk":"caution","bloomMonths":[5,6]},{"id":40,"nameKo":"글라디올러스","nameEn":"Gladiolus","scientificName":"Gladiolus spp.","safe":false,"severity":"moderate","symptoms":"침 흘림, 구토, 설사, 무기력. 구근 부위 독성 강함","note":"구근에 독성 집중","aliases":[],"risk":"caution","bloomMonths":[7,8,9]}]};

const RISK_BG = { safe: 'var(--safe-bg)', caution: 'var(--caution-bg)', danger: 'var(--danger-bg)' };
const RISK_COLOR = { safe: 'var(--safe)', caution: 'var(--caution)', danger: 'var(--danger)' };
const RISK_EMOJI = { safe: '\uD83C\uDF3F', caution: '\u26A0\uFE0F', danger: '\uD83D\uDEAB' };
// 은은한 고양이 말투 — 위험도별 한마디
const CAT_SAYS = {
  safe: '이 꽃은 내 옆에 있어도 괜찮아. 안심하고 들여도 돼, 집사야.',
  caution: '이 꽃은 조금 조심해 줘. 내 손 닿는 곳엔 안 두는 게 좋겠어.',
  danger: '이 꽃은 나한테 위험해. 집에는 들이지 말아 줘… 부탁이야.'
};
const MONTH = new Date().getMonth() + 1;
const IMG_BASE = 'images/';

function normalize(s){ return String(s).replace(/\s+/g,'').toLowerCase(); }
function searchFlower(query){
  if(!query || !query.trim()) return null;
  const q = normalize(query);
  for(const f of DATA.flowers){
    if(normalize(f.nameKo) === q) return f;
    if(normalize(f.nameEn) === q) return f;
    if(f.aliases.some(a => normalize(a) === q)) return f;
  }
  return null;
}
function getRiskInfo(r){ return DATA.metadata.riskLevels[r] || null; }
function suggestFlowers(query, limit){
  limit = limit || 5;
  if(!query || !query.trim()) return [];
  const q = normalize(query);
  return DATA.flowers.filter(f => normalize(f.nameKo).startsWith(q)).slice(0, limit);
}
function flowersByMonth(m){
  const inS = DATA.flowers.filter(f => f.bloomMonths.includes(m));
  return { safe: inS.filter(f=>f.risk==='safe'), caution: inS.filter(f=>f.risk==='caution'), danger: inS.filter(f=>f.risk==='danger') };
}
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function imgName(f){ return IMG_BASE + encodeURIComponent(f.nameKo) + '.jpg'; }

const qInput = document.getElementById('q');
const suggestBox = document.getElementById('suggest');
const resultBox = document.getElementById('result');

function renderResult(flower){
  suggestBox.innerHTML = '';
  if(flower === null){
    resultBox.innerHTML =
      '<div class="not-found"><div class="not-found-title">아직 모르는 꽃이야</div>' +
      '<div class="not-found-desc">"' + esc(qInput.value) + '"는 내 꽃 목록에 아직 없어. 정식 이름이나 다른 이름으로 다시 불러봐 줄래?</div></div>';
    return;
  }
  const ri = getRiskInfo(flower.risk);
  // 사진: 있으면 표시, 없으면(onerror) 자리표시로 교체
  const photo =
    '<img class="result-photo" src="' + imgName(flower) + '" alt="' + esc(flower.nameKo) + '" ' +
    'onerror="this.outerHTML=&quot;<div class=\'photo-ph\'><div class=\'photo-ph-emoji\'>\uD83C\uDF38</div><div class=\'photo-ph-text\'>사진 준비 중이야</div></div>&quot;">';
  let html =
    '<div class="result-card" style="background:' + RISK_BG[flower.risk] + ';border-color:' + RISK_COLOR[flower.risk] + '">' +
    photo +
    '<div class="result-body">' +
    '<div class="result-head"><div>' +
    '<div class="result-name">' + esc(flower.nameKo) + '</div>' +
    '<div class="result-sci">' + esc(flower.scientificName) + '</div></div>' +
    '<div class="badge" style="background:' + RISK_COLOR[flower.risk] + '">' + RISK_EMOJI[flower.risk] + ' ' + ri.label + '</div></div>' +
    '<div class="risk-desc" style="color:' + RISK_COLOR[flower.risk] + '">' + esc(ri.desc) + '</div>' +
    '<div class="cat-says"><span class="paw">\uD83D\uDC3E</span><span>' + esc(CAT_SAYS[flower.risk]) + '</span></div>';
  if(flower.symptoms) html += '<div class="info-block"><div class="info-label">증상</div><div class="info-text">' + esc(flower.symptoms) + '</div></div>';
  if(flower.note) html += '<div class="info-block"><div class="info-label">참고</div><div class="info-text">' + esc(flower.note) + '</div></div>';
  if(flower.risk === 'danger') html += '<div class="emergency">혹시 내가 이 꽃을 먹은 것 같으면, 망설이지 말고 바로 동물병원에 전화해 줘.</div>';
  html += '</div></div>';
  resultBox.innerHTML = html;
}

function doSearch(term){
  const t = (term !== undefined) ? term : qInput.value;
  if(!t.trim()) return;
  qInput.value = t;
  suggestBox.innerHTML = '';
  renderResult(searchFlower(t));
}

qInput.addEventListener('input', function(){
  resultBox.innerHTML = '';
  const v = qInput.value;
  if(!v.trim()){ suggestBox.innerHTML=''; return; }
  const sug = suggestFlowers(v, 5);
  if(sug.length === 0){ suggestBox.innerHTML=''; return; }
  suggestBox.innerHTML = '<div class="suggest">' + sug.map(f =>
    '<div class="suggest-item" data-name="' + esc(f.nameKo) + '"><span>' + esc(f.nameKo) + '</span>' +
    '<span class="dot" style="background:' + RISK_COLOR[f.risk] + '"></span></div>').join('') + '</div>';
  suggestBox.querySelectorAll('.suggest-item').forEach(el => el.addEventListener('click', () => doSearch(el.dataset.name)));
});
qInput.addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
document.getElementById('searchBtn').addEventListener('click', () => doSearch());

// 그리드 카드 생성 (사진 포함)
function gridCard(f, danger){
  const ph = '<div class="grid-photo-ph">' + (danger ? '\uD83D\uDEAB' : '\uD83C\uDF38') + '</div>';
  const img = '<img class="grid-photo" src="' + imgName(f) + '" alt="' + esc(f.nameKo) + '" ' +
    'onerror="this.outerHTML=&quot;' + ph.replace(/"/g,'&quot;') + '&quot;">';
  return '<div class="grid-card" data-name="' + esc(f.nameKo) + '">' + img +
    '<div class="grid-info"><span class="grid-name">' + esc(f.nameKo) + '</span>' +
    '<span class="dot" style="background:' + RISK_COLOR[f.risk] + '"></span></div></div>';
}

const md = flowersByMonth(MONTH);
document.getElementById('monthEyebrow').textContent = MONTH + '월의 꽃';
const safeGrid = document.getElementById('safeGrid');
if(md.safe.length === 0){
  safeGrid.innerHTML = '<span style="color:var(--sub);font-size:14px">이번 달은 추천할 안전한 꽃이 아직 없어, 집사야.</span>';
} else {
  safeGrid.innerHTML = md.safe.map(f => gridCard(f, false)).join('');
}
if(md.danger.length > 0){
  document.getElementById('dangerSection').innerHTML =
    '<div class="section-title warn">이맘때 특히 조심해 줘</div>' +
    '<div class="section-sub">예쁘지만 나한테는 위험한 아이들이야. 꽃다발에 섞여 오기 쉬우니 잘 봐 줘. 🐾</div>' +
    '<div class="grid">' + md.danger.map(f => gridCard(f, true)).join('') + '</div>';
}
document.querySelectorAll('.grid-card').forEach(el =>
  el.addEventListener('click', () => { doSearch(el.dataset.name); window.scrollTo({top:0, behavior:'smooth'}); }));

document.getElementById('disclaimer').textContent = DATA.metadata.disclaimer;
document.getElementById('source').textContent = '출처: ' + DATA.metadata.source;
</script>
</body>
</html>
